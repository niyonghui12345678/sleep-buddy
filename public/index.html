<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#070b1e">
<link rel="manifest" href="/manifest.json">
<title>好眠 — NYH & SST</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Nunito:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#070b1e;--sf:rgba(15,20,50,0.7);--card:rgba(20,25,60,0.55);--gl:rgba(255,255,255,0.035);--bd:rgba(255,255,255,0.07);--aa:#8b7cf0;--ab:#f0a04b;--gn:#34d399;--rd:#f06060;--tx:#e8e5f5;--sc:#8b87a5;--dm:#55516a;--r:16px;--rs:12px;--sb:env(safe-area-inset-bottom,0px)}
html,body{height:100%;font-family:'Nunito','Quicksand',sans-serif;background:var(--bg);color:var(--tx);-webkit-tap-highlight-color:transparent;overflow:hidden}
canvas#bg{position:fixed;inset:0;pointer-events:none;z-index:0}
.grain{position:fixed;inset:0;pointer-events:none;z-index:1;opacity:.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:160px}
.app{position:relative;z-index:2;height:100%;max-width:440px;margin:0 auto;display:flex;flex-direction:column}
header{flex-shrink:0;padding:14px 20px 6px;display:flex;align-items:center;justify-content:space-between}
.hello{font-family:'Quicksand',sans-serif;font-weight:700;font-size:1.3rem;background:linear-gradient(135deg,var(--aa),var(--ab));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdate{font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--dm);margin-top:1px}
.conn{width:10px;height:10px;border-radius:50%;flex-shrink:0;transition:all .3s}
.conn.on{background:var(--gn);box-shadow:0 0 8px rgba(52,211,153,0.4)}.conn.off{background:var(--rd);box-shadow:0 0 8px rgba(240,96,96,0.4)}
.pages{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scroll-behavior:smooth}
.pages::-webkit-scrollbar{display:none}
.page{display:none;padding:6px 20px 24px;animation:fi .3s ease}.page.active{display:block}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.tab-bar{flex-shrink:0;display:flex;background:rgba(10,12,30,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--bd);padding:6px 4px calc(6px + var(--sb))}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 2px;border:none;background:transparent;border-radius:10px;cursor:pointer;transition:all .25s;position:relative}
.tab .ti{font-size:1.05rem;transition:transform .25s}.tab .tl{font-family:'Quicksand',sans-serif;font-size:.58rem;font-weight:600;color:var(--dm);transition:color .25s}
.tab.on .ti{transform:scale(1.15)}.tab.on .tl{color:var(--tx)}
.tab-dot{position:absolute;top:4px;right:20%;width:6px;height:6px;border-radius:50%;background:var(--rd);box-shadow:0 0 6px rgba(240,96,96,0.6);display:none}
.tab-dot.show{display:block}
.ut{display:flex;background:var(--gl);border:1px solid var(--bd);border-radius:14px;padding:4px;gap:4px;margin:4px 0 14px}
.ub{flex:1;padding:10px;border:none;border-radius:11px;background:transparent;color:var(--sc);font-family:'Quicksand',sans-serif;font-weight:600;font-size:.88rem;cursor:pointer;transition:all .3s;display:flex;align-items:center;justify-content:center;gap:6px}
.ub .ud{width:8px;height:8px;border-radius:50%;flex-shrink:0}.ub.on{color:#fff}
.ub.ua.on{background:var(--aa)}.ub.ub2.on{background:var(--ab)}
.hero{background:var(--sf);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--bd);border-radius:var(--r);padding:20px;margin-bottom:14px;position:relative;overflow:hidden;transition:all .4s}
.hero::after{content:'';position:absolute;inset:0;opacity:0;transition:opacity .4s;pointer-events:none;border-radius:var(--r)}
.hero.sl{border-color:rgba(139,124,240,0.25)}.hero.sl::after{background:radial-gradient(ellipse at 30% 80%,rgba(139,124,240,0.07),transparent 70%);opacity:1}
.hero.wk{border-color:rgba(240,160,75,0.2)}.hero.wk::after{background:radial-gradient(ellipse at 70% 20%,rgba(240,160,75,0.07),transparent 70%);opacity:1}
.htop{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.hav{width:48px;height:48px;border-radius:50%;display:grid;place-items:center;font-family:'Quicksand',sans-serif;font-weight:700;font-size:1.1rem;color:#fff;flex-shrink:0}
.hav.ha{background:linear-gradient(135deg,#6c5ce7,#a78bfa)}.hav.hb{background:linear-gradient(135deg,#e17055,#f0a04b)}
.hinfo{flex:1}.hname{font-family:'Quicksand',sans-serif;font-weight:700;font-size:1.05rem}
.hbadge{display:inline-block;font-size:.72rem;font-weight:600;padding:3px 10px;border-radius:20px;margin-top:4px}
.bw{background:rgba(255,255,255,0.06);color:var(--sc)}.bs{background:rgba(139,124,240,0.15);color:var(--aa)}.bo{background:rgba(52,211,153,0.12);color:var(--gn)}.bl{background:rgba(240,96,96,0.12);color:var(--rd)}
.hpts{display:flex;flex-direction:column;align-items:center;background:rgba(52,211,153,0.08);border:1px solid rgba(52,211,153,0.15);border-radius:12px;padding:6px 14px}
.hpn{font-family:'Quicksand',sans-serif;font-weight:700;font-size:1.3rem;color:var(--gn)}.hpl{font-size:.6rem;color:var(--sc);letter-spacing:.5px}
.htimes{display:flex;align-items:center}.ht{flex:1;text-align:center}
.htl{font-size:.65rem;color:var(--dm);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.htv{font-family:'JetBrains Mono',monospace;font-size:1.4rem;font-weight:500;color:var(--sc);transition:color .3s}.htv.done{color:var(--tx)}.htd{width:1px;height:36px;background:var(--bd);flex-shrink:0}
.acts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.act{padding:16px 10px;border:none;border-radius:var(--rs);cursor:pointer;font-family:'Quicksand',sans-serif;font-weight:700;font-size:.92rem;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all .2s}
.act:active:not(:disabled){transform:scale(.96)}.act:disabled{opacity:.3;cursor:not-allowed}
.asl{background:linear-gradient(135deg,#5b4dcf,#7c6bf0);color:#fff}
.awk{background:linear-gradient(135deg,#c87d10,#f0a04b);color:#fff}
.act .ai{font-size:1.3rem}.act .as{font-size:.6rem;opacity:.7;font-family:'JetBrains Mono',monospace}
.ptr{background:var(--gl);border:1px solid var(--bd);border-radius:var(--rs);padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.pav{width:32px;height:32px;border-radius:50%;display:grid;place-items:center;font-size:.7rem;font-weight:700;color:#fff;flex-shrink:0}
.pav.pa{background:linear-gradient(135deg,#6c5ce7,#a78bfa)}.pav.pb{background:linear-gradient(135deg,#e17055,#f0a04b)}
.pn{font-weight:700;font-size:.85rem}.pbdg{font-size:.65rem;padding:2px 8px;border-radius:12px;margin-left:auto}
.msg{background:var(--gl);border:1px solid var(--bd);border-radius:var(--rs);padding:14px 18px;text-align:center;font-size:.85rem;color:var(--sc);line-height:1.6}.msg b{color:var(--gn)}
.ph{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.pc{background:var(--sf);backdrop-filter:blur(20px);border:1px solid var(--bd);border-radius:var(--rs);padding:16px;text-align:center;position:relative;overflow:hidden}
.pc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.pc.pca::before{background:linear-gradient(90deg,var(--aa),#a78bfa)}.pc.pcb::before{background:linear-gradient(90deg,var(--ab),#f0c060)}
.pcn{font-size:.72rem;color:var(--sc);margin-bottom:4px}
.pcv{font-family:'Quicksand',sans-serif;font-weight:700;font-size:1.8rem}
.pca .pcv{color:var(--aa)}.pcb .pcv{color:var(--ab)}.pcl{font-size:.6rem;color:var(--dm);letter-spacing:.5px}
.st{font-family:'Quicksand',sans-serif;font-weight:700;font-size:.85rem;color:var(--sc);margin:20px 0 12px;display:flex;align-items:center;justify-content:space-between}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.si{background:var(--card);border:1px solid var(--bd);border-radius:var(--rs);padding:16px 12px;text-align:center;position:relative;transition:border-color .25s}
.si:hover{border-color:rgba(139,124,240,0.2)}
.sie{font-size:1.8rem;margin-bottom:6px}.sin{font-family:'Quicksand',sans-serif;font-weight:700;font-size:.85rem;margin-bottom:2px}
.sid{font-size:.65rem;color:var(--dm);margin-bottom:8px;line-height:1.4;min-height:28px}
.sic{font-family:'JetBrains Mono',monospace;font-size:.75rem;color:var(--gn);margin-bottom:8px}
.sib{width:100%;padding:8px;border:none;border-radius:10px;background:linear-gradient(135deg,#5b4dcf,#7c6bf0);color:#fff;font-family:'Quicksand',sans-serif;font-weight:600;font-size:.78rem;cursor:pointer;transition:all .2s}
.sib:hover{box-shadow:0 4px 16px rgba(124,107,240,0.25)}.sib:disabled{opacity:.3;cursor:not-allowed}
.sidl{position:absolute;top:6px;right:8px;background:none;border:none;color:var(--dm);font-size:.85rem;cursor:pointer;padding:4px;opacity:0;transition:opacity .2s}.si:hover .sidl{opacity:1}
.addb{margin-top:12px;width:100%;padding:14px;border:2px dashed var(--bd);border-radius:var(--rs);background:transparent;color:var(--sc);font-family:'Quicksand',sans-serif;font-weight:600;font-size:.85rem;cursor:pointer;transition:all .2s}.addb:hover{border-color:var(--aa);color:var(--aa)}
.rl{display:flex;flex-direction:column;gap:8px}
.ri2{display:flex;align-items:center;gap:10px;background:var(--gl);border:1px solid var(--bd);border-radius:var(--rs);padding:10px 14px;font-size:.8rem}
.re{font-size:1.2rem}.rf{flex:1}.rf b{font-size:.82rem}.rf small{display:block;font-size:.65rem;color:var(--dm)}.rc{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--rd)}
.sr{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.sc2{background:var(--card);border:1px solid var(--bd);border-radius:var(--rs);padding:14px 10px;text-align:center}
.sn{font-family:'Quicksand',sans-serif;font-weight:700;font-size:1.5rem}.slb{font-size:.6rem;color:var(--dm);letter-spacing:.5px}
.wc{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:16px}
.wd{text-align:center}.wl{font-family:'JetBrains Mono',monospace;font-size:.55rem;color:var(--dm);margin-bottom:6px;text-transform:uppercase}
.wds{display:flex;flex-direction:column;gap:3px;align-items:center}
.wdot{width:18px;height:18px;border-radius:6px;border:1.5px solid var(--bd);background:var(--gl)}
.wdot.on{border-color:var(--gn);background:rgba(52,211,153,0.2)}.wdot.off{border-color:var(--rd);background:rgba(240,96,96,0.15)}.wdot.pt{border-color:var(--ab);background:rgba(240,160,75,0.12)}.wdot.today{box-shadow:0 0 0 2px var(--sc)}
.hl2{display:flex;flex-direction:column;gap:6px}
.hi2{display:flex;align-items:center;gap:10px;background:var(--gl);border:1px solid var(--bd);border-radius:var(--rs);padding:10px 14px;font-size:.78rem}
.hid{font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--dm);width:58px;flex-shrink:0}
.hii{flex:1}.hibs{display:flex;gap:4px;flex-wrap:wrap}
.hib{font-size:.6rem;padding:2px 7px;border-radius:10px}
.hibo{background:rgba(52,211,153,0.1);color:var(--gn)}.hibl{background:rgba(240,96,96,0.1);color:var(--rd)}.hip{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--gn);flex-shrink:0}
.sg{background:var(--card);border:1px solid var(--bd);border-radius:var(--rs);padding:16px;margin-bottom:12px}
.sgt{font-family:'Quicksand',sans-serif;font-weight:700;font-size:.85rem;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.sgi{width:100%;padding:10px 14px;background:var(--gl);border:1px solid var(--bd);border-radius:10px;color:var(--tx);font-size:.88rem;font-family:'Nunito',sans-serif;outline:none;transition:border-color .2s;margin-bottom:8px}.sgi:focus{border-color:var(--aa)}
.sgi[type="time"]{font-family:'JetBrains Mono',monospace;color-scheme:dark}
.sgr{display:grid;grid-template-columns:1fr 1fr;gap:8px}.sgl{font-size:.68rem;color:var(--dm);margin-bottom:4px;display:block}
.sgb{width:100%;padding:12px;border:none;border-radius:10px;font-family:'Quicksand',sans-serif;font-weight:600;font-size:.85rem;cursor:pointer;transition:all .2s;margin-top:6px}
.sgp{background:linear-gradient(135deg,var(--aa),#a78bfa);color:#fff}
.sgd{background:rgba(240,96,96,0.12);border:1px solid rgba(240,96,96,0.2);color:var(--rd)}
.sgdsc{font-size:.75rem;color:var(--dm);line-height:1.5;margin-bottom:10px}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.mbg.open{opacity:1;pointer-events:auto}
.md{background:#12163a;border:1px solid var(--bd);border-radius:20px 20px 0 0;width:100%;max-width:440px;padding:24px 20px calc(24px + var(--sb));transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);max-height:80vh;overflow-y:auto}
.mbg.open .md{transform:translateY(0)}
.mt{font-family:'Quicksand',sans-serif;font-weight:700;font-size:1.15rem;text-align:center;margin-bottom:20px}
.mf{margin-bottom:14px}.ml{font-size:.72rem;color:var(--dm);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-weight:600}
.mi{width:100%;padding:10px 14px;background:var(--gl);border:1px solid var(--bd);border-radius:10px;color:var(--tx);font-size:.88rem;font-family:'Nunito',sans-serif;outline:none;transition:border-color .2s}.mi:focus{border-color:var(--aa)}
.ma2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:20px}
.mb{padding:13px;border:none;border-radius:12px;font-family:'Quicksand',sans-serif;font-weight:700;font-size:.88rem;cursor:pointer;transition:all .2s}
.mbs{background:linear-gradient(135deg,var(--aa),#a78bfa);color:#fff}.mbc{background:var(--gl);border:1px solid var(--bd);color:var(--sc)}
.tst{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:rgba(20,24,58,0.95);backdrop-filter:blur(12px);border:1px solid var(--bd);border-radius:14px;padding:12px 20px;font-size:.85rem;font-weight:600;z-index:200;transition:transform .4s cubic-bezier(.4,0,.2,1),opacity .4s;opacity:0;pointer-events:none;max-width:340px;text-align:center;white-space:nowrap}
.tst.show{transform:translateX(-50%) translateY(0);opacity:1}.tst.ok{border-color:rgba(52,211,153,0.3);color:var(--gn)}.tst.wn{border-color:rgba(240,160,75,0.3);color:var(--ab)}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.04)}100%{transform:scale(1)}}
@keyframes breathe{0%,100%{box-shadow:0 0 15px rgba(139,124,240,0.06)}50%{box-shadow:0 0 30px rgba(139,124,240,0.15)}}
.pop{animation:pop .4s ease}.breathing{animation:breathe 3s ease-in-out infinite}
.loading{display:flex;align-items:center;justify-content:center;height:60vh;flex-direction:column;gap:12px}
.loading .sp{width:28px;height:28px;border:3px solid var(--bd);border-top-color:var(--aa);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}.loading p{font-size:.85rem;color:var(--sc)}
@media(min-width:441px){.app{border-left:1px solid var(--bd);border-right:1px solid var(--bd)}}
.egg-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);z-index:300;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .4s}
.egg-overlay.show{opacity:1;pointer-events:auto}
.egg-card{width:300px;border-radius:24px;padding:36px 24px 28px;text-align:center;position:relative;overflow:hidden;animation:eggIn .6s cubic-bezier(.34,1.56,.64,1)}
@keyframes eggIn{0%{transform:scale(0.3) rotate(-8deg);opacity:0}60%{transform:scale(1.06) rotate(1deg)}100%{transform:scale(1) rotate(0);opacity:1}}
.ec{background:linear-gradient(145deg,#1a1505,#2a2010);border:1px solid rgba(255,215,0,0.25);box-shadow:0 0 40px rgba(255,215,0,0.08),inset 0 0 30px rgba(255,215,0,0.03)}
.ec-shard{background:linear-gradient(145deg,#1a1505,#2a1808);border-color:rgba(255,215,0,0.3);box-shadow:0 0 50px rgba(255,215,0,0.1),inset 0 0 30px rgba(255,215,0,0.03)}
.ec-favor{background:linear-gradient(145deg,#1a0a15,#251020);border-color:rgba(244,114,182,0.3);box-shadow:0 0 50px rgba(244,114,182,0.1)}
.ec-reverse{background:linear-gradient(145deg,#15101e,#1e1530);border-color:rgba(167,139,250,0.3);box-shadow:0 0 50px rgba(167,139,250,0.1)}
.ec-feed{background:linear-gradient(145deg,#0a1a15,#102518);border-color:rgba(52,211,153,0.3);box-shadow:0 0 50px rgba(52,211,153,0.1)}
.ec-swap{background:linear-gradient(145deg,#0a1220,#102035);border-color:rgba(96,165,250,0.3);box-shadow:0 0 50px rgba(96,165,250,0.1)}
.ec-sync{background:linear-gradient(145deg,#1a1208,#251a0a);border-color:rgba(251,146,60,0.3);box-shadow:0 0 50px rgba(251,146,60,0.1)}
.ec-wish{background:linear-gradient(145deg,#1a0a18,#251022);border-color:rgba(249,168,212,0.3);box-shadow:0 0 50px rgba(249,168,212,0.1)}
.ec-capsule{background:linear-gradient(145deg,#100a1e,#1a1230);border-color:rgba(129,140,248,0.3);box-shadow:0 0 50px rgba(129,140,248,0.1)}
.ec-album{background:linear-gradient(145deg,#0a1a1a,#102525);border-color:rgba(45,212,191,0.3);box-shadow:0 0 50px rgba(45,212,191,0.1)}
.ec-voice{background:linear-gradient(145deg,#1a0a18,#251022);border-color:rgba(244,114,182,0.3);box-shadow:0 0 50px rgba(244,114,182,0.1)}
.ec-meet{background:linear-gradient(145deg,#1a1505,#2a2010);border:2px solid transparent;border-image:linear-gradient(135deg,#ffd700,#ff8c00,#ffd700) 1;box-shadow:0 0 60px rgba(255,215,0,0.15),0 0 120px rgba(255,215,0,0.05)}
.ec-memorial{background:linear-gradient(145deg,#15101e,#1e1530);border-color:rgba(167,139,250,0.3);box-shadow:0 0 50px rgba(167,139,250,0.1)}
.ec-icon{font-size:3rem;margin-bottom:12px;filter:drop-shadow(0 0 12px rgba(255,255,255,0.2))}
.ec-name{font-family:'Quicksand',sans-serif;font-weight:700;font-size:1.15rem;margin-bottom:12px}
.ec-desc{font-size:.82rem;color:var(--sc);line-height:1.7;margin-bottom:8px;white-space:pre-line}
.ec-sub{font-size:.65rem;color:var(--dm);margin-bottom:16px;letter-spacing:.5px}
.ec-btn{padding:12px 32px;border:none;border-radius:24px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:var(--tx);font-family:'Quicksand',sans-serif;font-weight:700;font-size:.9rem;cursor:pointer;transition:all .2s}
.ec-btn:hover{background:rgba(255,255,255,0.15);transform:scale(1.05)}
.ec-sparkle{position:absolute;width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,0.6);animation:sparkle 2s ease-in-out infinite}
@keyframes sparkle{0%,100%{opacity:0;transform:scale(0)}50%{opacity:1;transform:scale(1)}}
.ec-sparkle:nth-child(1){top:15%;left:10%;animation-delay:0s}
.ec-sparkle:nth-child(2){top:25%;right:15%;animation-delay:.5s}
.ec-sparkle:nth-child(3){bottom:20%;left:20%;animation-delay:1s}
.ec-sparkle:nth-child(4){top:40%;right:8%;animation-delay:1.5s}
.bp-sum{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.bp-card{background:var(--card);border:1px solid var(--bd);border-radius:var(--rs);padding:14px;text-align:center}
.bp-card .bp-icon{font-size:1.2rem;margin-bottom:4px}
.bp-card .bp-name{font-size:.65rem;color:var(--dm);margin-bottom:4px}
.bp-card .bp-val{font-family:'Quicksand',sans-serif;font-weight:700;font-size:1.3rem;color:var(--aa)}
.bp-card.bp-green .bp-val{color:var(--gn)}
.bp-weekly{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rs);padding:16px;margin-bottom:16px;text-align:center}
.bp-weekly .bw-icon{font-size:2rem;margin-bottom:6px}
.bp-weekly .bw-name{font-family:'Quicksand',sans-serif;font-weight:700;font-size:1rem;margin-bottom:4px}
.bp-weekly .bw-desc{font-size:.75rem;color:var(--sc);line-height:1.5}
.bp-weekly .bw-empty{font-size:.8rem;color:var(--dm);padding:20px 0}
.bp-mile{background:var(--card);border:1px solid var(--bd);border-radius:var(--rs);padding:14px 16px;margin-bottom:10px}
.bp-mile-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.bp-mile-icon{font-size:1.3rem}
.bp-mile-name{font-weight:700;font-size:.85rem;flex:1}
.bp-mile-status{font-size:.7rem;padding:3px 10px;border-radius:12px;font-weight:600}
.ms-locked{background:rgba(255,255,255,0.05);color:var(--dm)}
.ms-unlock{background:rgba(52,211,153,0.12);color:var(--gn)}
.ms-done{background:rgba(139,124,240,0.12);color:var(--aa)}
.bp-bar{height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden}
.bp-fill{height:100%;border-radius:3px;transition:width .6s ease}
.bp-fill.gold{background:linear-gradient(90deg,#ffd700,#ff8c00)}.bp-fill.teal{background:linear-gradient(90deg,#2dd4bf,#14b8a6)}.bp-fill.pink{background:linear-gradient(90deg,#f472b6,#ec4899)}.bp-fill.purple{background:linear-gradient(90deg,#a78bfa,#7c3aed)}
.bp-mile-sub{font-size:.65rem;color:var(--dm);margin-top:6px;display:flex;justify-content:space-between}
.bp-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.bp-act{padding:10px;border:none;border-radius:10px;font-family:'Quicksand',sans-serif;font-weight:600;font-size:.78rem;cursor:pointer;transition:all .2s}
.bp-act-primary{background:linear-gradient(135deg,var(--aa),#a78bfa);color:#fff}
.bp-act-primary:disabled{opacity:.3;cursor:not-allowed}
.bp-act-ghost{background:var(--gl);border:1px solid var(--bd);color:var(--sc)}
.bp-hist{display:flex;flex-direction:column;gap:6px;margin-top:16px}
.bp-hi{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--gl);border:1px solid var(--bd);border-radius:10px;font-size:.78rem}
.bp-hi-icon{font-size:1rem}.bp-hi-name{flex:1;font-weight:600}.bp-hi-date{font-size:.65rem;color:var(--dm);font-family:'JetBrains Mono',monospace;flex-shrink:0}
.bp-wallpaper{margin-top:12px;background:var(--card);border:1px solid rgba(255,215,0,0.2);border-radius:var(--rs);padding:16px;text-align:center}
.bp-wallpaper canvas{max-width:100%;border-radius:12px;margin-bottom:10px}
.wp-modal{position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:300;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;opacity:0;pointer-events:none;transition:opacity .3s}
.wp-modal.show{opacity:1;pointer-events:auto}
.wp-modal img{max-width:90%;max-height:75vh;border-radius:16px}
.wp-modal p{font-size:.8rem;color:var(--sc)}
.wp-modal button{padding:10px 24px;border:1px solid var(--bd);background:var(--gl);color:var(--tx);border-radius:12px;font-family:'Quicksand',sans-serif;font-weight:600;cursor:pointer}
/* ══ 彩蛋使用新增样式 ══ */
.bp-use-btn{padding:5px 14px;border:none;border-radius:8px;background:linear-gradient(135deg,var(--aa),#a78bfa);color:#fff;font-family:'Quicksand',sans-serif;font-weight:600;font-size:.7rem;cursor:pointer;transition:all .2s;flex-shrink:0;white-space:nowrap}
.bp-use-btn:hover{box-shadow:0 4px 12px rgba(124,107,240,0.25)}.bp-use-btn:disabled{opacity:.3;cursor:not-allowed}
.bp-used-item{opacity:.35}
.bp-used-label{font-size:.62rem;color:var(--dm);padding:3px 10px;border-radius:10px;background:rgba(255,255,255,0.04);flex-shrink:0;white-space:nowrap}
.bp-sec-sub{font-size:.68rem;color:var(--dm);margin:10px 0 6px;padding-left:2px;letter-spacing:.5px}
.bp-use-row{margin-bottom:14px}
.bp-note{font-size:.7rem;color:var(--dm);margin-top:8px;text-align:center}
</style>
</head>

<script>
var S=null,U=localStorage.getItem('hb_u')||'A',TAB='home',failCount=0;
var now=function(){return new Date()},td=function(){var d=now();return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate())};
var p2=function(n){return String(n).padStart(2,'0')},tS=function(d){return p2(d.getHours())+':'+p2(d.getMinutes())};
var pM=function(s){var a=s.split(':');return parseInt(a[0])*60+parseInt(a[1])};
var lastH='',eggQueue=[],eggShowing=false;

/* ═══ 时间判定 ═══ */
function isSleepOnTime(a){var m=pM(a);return m>=1320||m<=30}
function isWakeOnTime(a,tg){var a2=pM(a),t2=pM(tg),d=a2-t2;if(d>720)d-=1440;if(d<-720)d+=1440;return d>=-180&&d<=0}
function canSleepNow(){var h=now().getHours(),m=now().getMinutes(),mins=h*60+m;return mins>=1320||mins<=30}

/* ═══ 睡眠归属与待完成查找 ═══ */
function getSleepDate(u){
  var d=new Date(),h=d.getHours();
  if(h<8){
    var yd=new Date(d);yd.setDate(d.getDate()-1);
    var yk=yd.getFullYear()+'-'+p2(yd.getMonth()+1)+'-'+p2(yd.getDate());
    var yr=S.recs[yk]&&S.recs[yk][u];
    if(!yr||!yr.s)return yk
  }
  return td()
}
function findPendingSleep(u){for(var i=0;i<3;i++){var cd=new Date();cd.setDate(cd.getDate()-i);var k=cd.getFullYear()+'-'+p2(cd.getMonth()+1)+'-'+p2(cd.getDate());var rec=S.recs[k];if(rec&&rec[u]&&rec[u].s&&!rec[u].w)return{date:k,rec:rec[u]}}return null}
function getRecentRecord(u){for(var i=0;i<3;i++){var cd=new Date();cd.setDate(cd.getDate()-i);var k=cd.getFullYear()+'-'+p2(cd.getMonth()+1)+'-'+p2(cd.getDate());var rec=S.recs[k]&&S.recs[k][u];if(rec&&rec.s)return{date:k,s:rec.s,w:rec.w}}return null}
function canWakeNow(u){var pend=findPendingSleep(u);if(!pend)return false;var sMins=pM(pend.rec.s),nMins=pM(tS(now())),elapsed=nMins-sMins;if(elapsed<0)elapsed+=1440;return elapsed>=180}

/* ═══ 彩蛋初始化 ═══ */
function ensureEggs(){
  if(!S.eggs)S.eggs={shards:{A:0,B:0},freePass:{A:0,B:0},backpack:[],weeklyEgg:null,lastDailyEgg:{A:null,B:null},lastWeeklyEgg:null,albumMarked:{A:false,B:false},voiceMarked:{A:false,B:false},unlockMonth:null,wallpaperCount:0,repairCards:{A:1,B:1}};
  if(!S.eggs.repairCards)S.eggs.repairCards={A:1,B:1};
  if(S.eggs.backpack){S.eggs.backpack.forEach(function(item){if(item.used===undefined)item.used=false})}
  if(S.eggs.weeklyEgg&&S.eggs.weeklyEgg.used===undefined){S.eggs.weeklyEgg.used=false}
}

/* ═══ 判定函数 ═══ */
function isBothOnTime(r){if(!r||!r.A||!r.A.s||!r.A.w||!r.B||!r.B.s||!r.B.w)return false;return isWakeOnTime(r.A.w,S.targets.A.wake)&&isWakeOnTime(r.B.w,S.targets.B.wake)}
function getStreak(u){var streak=0,d=new Date(),tk=td(),tr=S.recs[tk];var todayOk=tr&&tr[u]&&tr[u].s&&tr[u].w&&isWakeOnTime(tr[u].w,S.targets[u].wake);if(!todayOk)d.setDate(d.getDate()-1);var pend=findPendingSleep(u),skipDate=pend?pend.date:null;for(var i=0;i<365;i++){var cd=new Date(d);cd.setDate(d.getDate()-i);var k=cd.getFullYear()+'-'+p2(cd.getMonth()+1)+'-'+p2(cd.getDate());if(k===skipDate)continue;var r=S.recs[k];if(r&&r[u]&&r[u].s&&r[u].w&&isWakeOnTime(r[u].w,S.targets[u].wake))streak++;else break}return streak}
function getJointStreak(){var streak=0,d=new Date(),tk=td(),tr=S.recs[tk];if(!tr||!isBothOnTime(tr))d.setDate(d.getDate()-1);for(var i=0;i<365;i++){var cd=new Date(d);cd.setDate(d.getDate()-i);var k=cd.getFullYear()+'-'+p2(cd.getMonth()+1)+'-'+p2(cd.getDate());if(S.recs[k]&&isBothOnTime(S.recs[k]))streak++;else break}return streak}
function getTotalDays(){return Object.keys(S.recs).length}
function getMonthWorkProgress(){var d=new Date(),y=d.getFullYear(),m=d.getMonth(),td2=d.getDate(),done=0,total=0;for(var day=1;day<=td2;day++){var dt=new Date(y,m,day);var dw=dt.getDay();if(dw===0||dw===6)continue;total++;var k=y+'-'+p2(m+1)+'-'+p2(day);if(S.recs[k]&&isBothOnTime(S.recs[k]))done++}var dim=new Date(y,m+1,0).getDate(),mt=0;for(var day2=1;day2<=dim;day2++){var dt2=new Date(y,m,day2);if(dt2.getDay()!==0&&dt2.getDay()!==6)mt++}return{done:done,total:total,monthTotal:mt}}
function isMonthFull(){var p=getMonthWorkProgress();return p.done===p.monthTotal&&p.done>0}
function getMonday(){var d=new Date(),day=d.getDay(),diff=d.getDate()-day+(day===0?-6:1);var mon=new Date(d.getFullYear(),d.getMonth(),diff);return mon.getFullYear()+'-'+p2(mon.getMonth()+1)+'-'+p2(mon.getDate())}

/* ═══ 补签卡（个人）═══ */
function getRepairDayFor(u){var pend=findPendingSleep(u),skipDate=pend?pend.date:null;for(var i=0;i<30;i++){var cd=new Date();cd.setDate(cd.getDate()-i);var k=cd.getFullYear()+'-'+p2(cd.getMonth()+1)+'-'+p2(cd.getDate());if(k===skipDate)continue;var r=S.recs[k]&&S.recs[k][u];if(r&&r.s&&r.w&&isWakeOnTime(r.w,S.targets[u].wake))continue;if(i===0&&!r&&canSleepNow())continue;return k}return null}
async function buyRepairCard(){var u=U,pts=S.points[u]||0;if(pts<40){toast('积分不足，需要 40 积分','wn');return}S.points[u]-=40;ensureEggs();S.eggs.repairCards[u]=(S.eggs.repairCards[u]||0)+1;await save();toast('🎫 '+S.names[u]+' 兑换了 1 张补签卡！','ok');render()}
async function useRepairCard(){var u=U;ensureEggs();if((S.eggs.repairCards[u]||0)<=0){toast('没有补签卡了','wn');return}var day=getRepairDayFor(u);if(!day){toast('最近 30 天没有断签，不需要补签','ok');return}S.eggs.repairCards[u]--;var rec=S.recs[day];if(!rec){rec={A:{s:null,w:null,sp:0,wp:0},B:{s:null,w:null,sp:0,wp:0}};S.recs[day]=rec}var pts=0;if(!rec[u]||!rec[u].s){rec[u]={s:'22:00',w:S.targets[u].wake,sp:1,wp:1};pts+=2}else{if(!isSleepOnTime(rec[u].s)){rec[u].s='22:00';if(!rec[u].sp){rec[u].sp=1;pts++}}if(!rec[u].w||!isWakeOnTime(rec[u].w,S.targets[u].wake)){rec[u].w=S.targets[u].wake;if(!rec[u].wp){rec[u].wp=1;pts++}}}if(pts>0)S.points[u]=(S.points[u]||0)+pts;await save();toast('🔧 '+day.slice(5)+' 已补签完成！','ok');render()}

/* ═══ 免罚券补签（新增）═══ */
async function useFreePass(){var u=U;ensureEggs();if((S.eggs.freePass[u]||0)<=0){toast('没有免罚券了','wn');return}var day=getRepairDayFor(u);if(!day){toast('最近 30 天没有断签，不需要补签','ok');return}S.eggs.freePass[u]--;var rec=S.recs[day];if(!rec){rec={A:{s:null,w:null,sp:0,wp:0},B:{s:null,w:null,sp:0,wp:0}};S.recs[day]=rec}var pts=0;if(!rec[u]||!rec[u].s){rec[u]={s:'22:00',w:S.targets[u].wake,sp:1,wp:1};pts+=2}else{if(!isSleepOnTime(rec[u].s)){rec[u].s='22:00';if(!rec[u].sp){rec[u].sp=1;pts++}}if(!rec[u].w||!isWakeOnTime(rec[u].w,S.targets[u].wake)){rec[u].w=S.targets[u].wake;if(!rec[u].wp){rec[u].wp=1;pts++}}}if(pts>0)S.points[u]=(S.points[u]||0)+pts;await save();toast('🎫 '+day.slice(5)+' 已用免罚券补签完成！','ok');render()}

/* ═══ 彩蛋卡使用（新增）═══ */
async function useEggCard(idx){ensureEggs();var item=S.eggs.backpack[idx];if(!item||item.used)return;item.used=true;await save();var nm={favor:'偏爱卡',reverse:'监督卡',feed:'投喂券'};toast('✨ '+(nm[item.type]||'彩蛋卡')+' 已使用','ok');render()}
async function useWeeklyEgg(){ensureEggs();if(!S.eggs.weeklyEgg||S.eggs.weeklyEgg.used)return;S.eggs.weeklyEgg.used=true;await save();var wef=WEEKLY_EGGS.find(function(e){return e.type===S.eggs.weeklyEgg.type});toast('✨ '+(wef?wef.name:'本周彩蛋')+' 已使用','ok');render()}

/* ═══ 彩蛋数据 ═══ */
var DAILY_EGGS=[{type:'shard',icon:'⭐',name:'幸运碎片',desc:'偷偷攒下一颗星星，是为你准备的\n集满3颗合成一张免罚券',cls:'ec-shard',sub:'截图保存 💫'},{type:'favor',icon:'💛',name:'今日偏爱卡',desc:'今天{partner}无条件迁就你一件小事\n主动报备、优先回复、陪你放空',cls:'ec-favor',sub:'截图发给TA兑现 💛'},{type:'reverse',icon:'🔄',name:'反向监督卡',desc:'今天你来当温柔监督官\n语气要软一点哦~',cls:'ec-reverse',sub:'截图为证 🔄'},{type:'feed',icon:'🧋',name:'云投喂券',desc:'凭此券可让对方为你点一杯小饮品\n存着，随时兑现',cls:'ec-feed',sub:'截图保存随时兑换 🧋'}];
var WEEKLY_EGGS=[{type:'swap',icon:'🔄',name:'角色互换日',desc:'本周选一天，督促方向反过来\n体验对方视角，自带反差小甜感',cls:'ec-swap',sub:'截图安排日程 🔄'},{type:'sync',icon:'🌅',name:'跨时空同步任务',desc:'选同一时间段做同一件事\n同步散步、晒太阳，低音量视频陪伴',cls:'ec-sync',sub:'截图约时间 🌅'},{type:'wish',icon:'💫',name:'心愿小兑换',desc:'提一个低成本小心愿\n分享一首歌、读一段短文、模仿对方语气五分钟',cls:'ec-wish',sub:'截图许愿 💫'},{type:'capsule',icon:'📮',name:'时光胶囊',desc:'写一段对彼此作息的小期许\n拍照保存，约定一个月后拆开看',cls:'ec-capsule',sub:'截图记录 📮'}];
var MILE_EGGS={gift:{icon:'👗',name:'心愿好礼解锁',desc:'连续打卡21天达成！\n奖励一件心仪已久的衣服或口红\n由对方来送你',cls:'ec-favor',sub:'截图发给TA兑现 💛'},album:{icon:'📸',name:'回忆碎片相册解锁',desc:'连续打卡21天达成！\n各自拍5张近期生活随手照\n拼成双人云相册互发\n配一句温柔碎碎念',cls:'ec-album',sub:'完成后各+3积分',pts:3},voice:{icon:'🎤',name:'语音盲盒解锁',desc:'本月工作日全勤达成！\n各自录3条语音盲盒：\n唱一首单曲循环的歌\n温柔早安/晚安\n模仿对方吐槽一件事',cls:'ec-voice',sub:'完成后各+3积分',pts:3},meet:{icon:'🎫',name:'线下见面券',desc:'连续打卡60天！\n凭此券可兑换：\n一次短途散步\n一起逛便利店\n共享一顿简餐',cls:'ec-meet',sub:'最好的奖励是见到你'},memorial:{icon:'📖',name:'全年纪念手册解锁',desc:'累计打卡100天！\n互相整理所有打卡记录\n做成线上图文纪念手册',cls:'ec-memorial',sub:'你们的故事值得被记住'}};

function queueEgg(type,cat,desc,cls,icon,sub){eggQueue.push({type:type,cat:cat,desc:desc,cls:cls,icon:icon,sub:sub});if(!eggShowing)showNextEgg()}
function showNextEgg(){if(eggQueue.length===0){eggShowing=false;return}eggShowing=true;var e=eggQueue.shift();displayEgg(e)}
function displayEgg(e){var card=document.getElementById('eggCard');card.className='egg-card '+e.cls;card.innerHTML='<div class="ec-sparkle"></div><div class="ec-sparkle"></div><div class="ec-sparkle"></div><div class="ec-sparkle"></div><div class="ec-icon">'+e.icon+'</div><div class="ec-name">'+e.name+'</div><div class="ec-desc">'+e.desc+'</div><div class="ec-sub">'+(e.sub||'')+'</div><button class="ec-btn" onclick="dismissEgg()">收下 ✨</button>';document.getElementById('eggOverlay').classList.add('show')}
function dismissEgg(){document.getElementById('eggOverlay').classList.remove('show');setTimeout(showNextEgg,400)}
function checkDailyEgg(u){ensureEggs();var today=td();if(S.eggs.lastDailyEgg[u]===today)return;if(Math.random()>0.15)return;var idx=Math.floor(Math.random()*DAILY_EGGS.length),eg=DAILY_EGGS[idx];S.eggs.lastDailyEgg[u]=today;if(eg.type==='shard'){S.eggs.shards[u]++;if(S.eggs.shards[u]>=3){S.eggs.shards[u]-=3;S.eggs.freePass[u]++}}var other=u==='A'?'B':'A',desc=eg.desc.replace('{partner}',S.names[other]);S.eggs.backpack.push({type:eg.type,date:today,by:u,used:false});save();queueEgg(eg.type,'daily',desc,eg.cls,eg.icon,eg.sub);document.getElementById('eggDot').classList.add('show')}
function checkWeeklyEgg(){ensureEggs();var mon=getMonday();if(S.eggs.lastWeeklyEgg===mon)return;var idx=Math.floor(Math.random()*WEEKLY_EGGS.length),eg=WEEKLY_EGGS[idx];S.eggs.lastWeeklyEgg=mon;S.eggs.weeklyEgg={type:eg.type,date:mon,used:false};save();queueEgg(eg.type,'weekly',eg.desc,eg.cls,eg.icon,eg.sub);document.getElementById('eggDot').classList.add('show')}

    h+='<div class="st">已解锁</div>';

    if(voiceUnlocked)h+='<div class="bp-mile"><div class="bp-mile-top"><span class="bp-mile-icon">🎤</span><span class="bp-mile-name">语音盲盒</span><span class="bp-mile-status ms-unlock">'+(S.eggs.voiceMarked.A&&S.eggs.voiceMarked.B?'已完成 ✓':'已解锁')+'</span></div><div class="bp-actions"><button class="bp-act bp-act-primary" '+(S.eggs.voiceMarked[U]?'disabled':'')+' onclick="markTask(\'voice\')">'+(S.eggs.voiceMarked[U]?'已标记 ✓':'我完成了 +3积分')+'</button></div></div>';
    if(wpUnlocked)h+='<div class="bp-mile"><div class="bp-mile-top"><span class="bp-mile-icon">🎨</span><span class="bp-mile-name">限定壁纸</span><span class="bp-mile-status ms-unlock">已解锁</span></div><div class="bp-actions"><button class="bp-act bp-act-ghost" onclick="genWallpaper()">生成壁纸 🎨</button></div></div>';
    if(giftUnlocked)h+='<div class="bp-mile"><div class="bp-mile-top"><span class="bp-mile-icon">👗</span><span class="bp-mile-name">心愿好礼</span><span class="bp-mile-status ms-unlock">已解锁 ✓</span></div></div>';
    if(meetUnlocked)h+='<div class="bp-mile"><div class="bp-mile-top"><span class="bp-mile-icon">🎫</span><span class="bp-mile-name">线下见面券</span><span class="bp-mile-status ms-unlock">已解锁 ✓</span></div></div>';
    if(memUnlocked)h+='<div class="bp-mile"><div class="bp-mile-top"><span class="bp-mile-icon">📖</span><span class="bp-mile-name">全年纪念手册</span><span class="bp-mile-status ms-unlock">已解锁 ✓</span></div></div>';
  }

  /* ── 彩蛋历史 ── */
  if(S.eggs.backpack.length>0){
    h+='<div class="st">彩蛋历史</div><div class="bp-hist">';
    var allEggs=DAILY_EGGS.concat(WEEKLY_EGGS);
    for(var k in MILE_EGGS)allEggs.push({type:k,icon:MILE_EGGS[k].icon,name:MILE_EGGS[k].name});
    [...S.eggs.backpack].reverse().forEach(function(b){
      var eg=allEggs.find(function(e){return e.type===b.type});
      if(eg){
        var usedMark=b.used?' <span style="color:var(--dm);font-size:.6rem">已使用</span>':'';
        h+='<div class="bp-hi'+(b.used?' bp-used-item':'')+'"><span class="bp-hi-icon">'+eg.icon+'</span><span class="bp-hi-name">'+eg.name+usedMark+'</span><span class="bp-hi-date">'+(b.by?S.names[b.by]+' · ':'')+b.date+'</span></div>';
      }
    });
    h+='</div>';
  }
  pg.innerHTML=h;
}

async function markTask(task){ensureEggs();var u=U;if(task==='album'){S.eggs.albumMarked[u]=true;if(S.eggs.albumMarked.A&&S.eggs.albumMarked.B){S.points.A=(S.points.A||0)+3;S.points.B=(S.points.B||0)+3;await save();toast('📸 相册任务完成！各+3积分','ok')}else{await save();toast('已标记，等对方也完成后获得积分','ok')}}if(task==='voice'){S.eggs.voiceMarked[u]=true;if(S.eggs.voiceMarked.A&&S.eggs.voiceMarked.B){S.points.A=(S.points.A||0)+3;S.points.B=(S.points.B||0)+3;await save();toast('🎤 语音盲盒完成！各+3积分','ok')}else{await save();toast('已标记，等对方也完成后获得积分','ok')}}render()}

function genWallpaper(){var cv=document.createElement('canvas');cv.width=1080;cv.height=1920;var ctx=cv.getContext('2d');var gd=ctx.createLinearGradient(0,0,0,1920);gd.addColorStop(0,'#070b1e');gd.addColorStop(0.4,'#0f1535');gd.addColorStop(0.7,'#15103a');gd.addColorStop(1,'#1a0a2e');ctx.fillStyle=gd;ctx.fillRect(0,0,1080,1920);for(var i=0;i<300;i++){var x=Math.random()*1080,y=Math.random()*1920,r=Math.random()*2+0.2,a=Math.random()*0.7+0.1;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle='rgba(220,220,255,'+a+')';ctx.fill()}ctx.textAlign='center';ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='600 28px sans-serif';ctx.fillText(S.names.A+'  &  '+S.names.B,540,800);var st=getJointStreak();ctx.fillStyle='#34d399';ctx.font='700 140px sans-serif';ctx.fillText(st,540,980);ctx.fillStyle='rgba(139,135,165,0.8)';ctx.font='600 28px sans-serif';ctx.fillText('天连续早睡早起',540,1040);ctx.fillStyle='rgba(139,135,165,0.5)';ctx.font='24px sans-serif';ctx.fillText('又一起坚持了一整个月 ✨',540,1120);ctx.fillStyle='rgba(85,81,106,0.5)';ctx.font='18px monospace';ctx.fillText(td(),540,1800);var url=cv.toDataURL('image/png');document.getElementById('wpImg').src=url;document.getElementById('wpModal').classList.add('show');S.eggs.wallpaperCount++;save()}

/* ═══ STATS ═══ */
function rStats(){var n=S.names,keys=Object.keys(S.recs).sort(),streakA=getStreak('A'),streakB=getStreak('B'),tot=(S.points.A||0)+(S.points.B||0);document.getElementById('pg-stats').innerHTML='<div class="sr" style="grid-template-columns:repeat(4,1fr)"><div class="sc2"><div class="sn">'+keys.length+'</div><div class="slb">打卡天数</div></div><div class="sc2"><div class="sn" style="color:var(--gn)">'+tot+'</div><div class="slb">总积分</div></div><div class="sc2"><div class="sn" style="color:var(--aa)">'+streakA+'</div><div class="slb">'+n.A+'连续</div></div><div class="sc2"><div class="sn" style="color:var(--ab)">'+streakB+'</div><div class="slb">'+n.B+'连续</div></div></div><div class="st">近四周记录</div>'+rCal()+'<div class="st">打卡历史</div><div class="hl2">'+(keys.length===0?'<div style="text-align:center;color:var(--dm);font-size:.8rem;padding:20px">暂无记录</div>':[...keys].reverse().slice(0,30).map(function(k){var r=S.recs[k];var pts=0,bdg='';['A','B'].forEach(function(u){if(r[u]&&r[u].s){bdg+='<span class="hib '+(isSleepOnTime(r[u].s)?'hibo':'hibl')+'">'+n[u]+'睡'+r[u].s+'</span>';pts+=r[u].sp||0}if(r[u]&&r[u].w){bdg+='<span class="hib '+(isWakeOnTime(r[u].w,S.targets[u].wake)?'hibo':'hibl')+'">'+n[u]+'起'+r[u].w+'</span>';pts+=r[u].wp||0}});return '<div class="hi2"><div class="hid">'+k.slice(5)+'</div><div class="hii"><div class="hibs">'+bdg+'</div></div><div class="hip">'+(pts?'+'+pts:'')+'</div></div>'}).join('')+'</div>')}
function rCal(){var d=new Date(),dw=d.getDay()||7,mn=new Date(d);mn.setDate(d.getDate()-(dw-1));var h='',lb=['一','二','三','四','五','六','日'];for(var w=3;w>=0;w--){var ws=new Date(mn);ws.setDate(mn.getDate()-w*7);h+='<div class="wc">';for(var i=0;i<7;i++){var dy=new Date(ws);dy.setDate(ws.getDate()+i);var k=dy.getFullYear()+'-'+p2(dy.getMonth()+1)+'-'+p2(dy.getDate()),iT=k===td(),rc=S.recs[k],dots='';['A','B'].forEach(function(u){var c='';if(rc&&rc[u]){if(rc[u].w)c=isWakeOnTime(rc[u].w,S.targets[u].wake)?'on':'off';else if(rc[u].s)c='pt'}dots+='<div class="wdot '+c+(iT?' today':'')+'"></div>'});h+='<div class="wd"><div class="wl">'+lb[i]+'</div><div class="wds">'+dots+'</div></div>'}h+='</div>'}return h}

/* ═══ SETTINGS ═══ */
function rSett(){var n=S.names,t=S.targets;document.getElementById('pg-settings').innerHTML='<div class="sg"><div class="sgt">👤 名字设置</div><span class="sgl">用户 A</span><input class="sgi" id="sNA" maxlength="6" value="'+n.A+'"><span class="sgl">用户 B</span><input class="sgi" id="sNB" maxlength="6" value="'+n.B+'"></div><div class="sg"><div class="sgt">🌙 起床目标</div><p class="sgdsc">入睡时间固定为 22:00 ~ 00:30，只需设置起床时间。</p><div class="sgr"><div><span class="sgl">'+n.A+' 起床</span><input class="sgi" type="time" id="sWA" value="'+t.A.wake+'"></div><div><span class="sgl">'+n.B+' 起床</span><input class="sgi" type="time" id="sWB" value="'+t.B.wake+'"></div></div></div><div class="sg"><div class="sgt">💾 保存</div><button class="sgb sgp" onclick="doSave()">保存设置</button></div><div class="sg"><div class="sgt">🗑️ 危险操作</div><p class="sgdsc">清除所有打卡记录、积分和商城数据，不可恢复。</p><button class="sgb sgd" onclick="doReset()">清除所有数据</button></div>'}
async function doSave(){S.names.A=document.getElementById('sNA').value.trim()||'NYH';S.names.B=document.getElementById('sNB').value.trim()||'SST';S.targets.A.sleep='22:00';S.targets.A.wake=document.getElementById('sWA').value||'07:00';S.targets.B.sleep='22:00';S.targets.B.wake=document.getElementById('sWB').value||'07:00';await save();toast('设置已保存','ok');render()}
async function doReset(){if(!confirm('确定要清除所有数据吗？此操作不可撤销！'))return;S={names:{A:'NYH',B:'SST'},targets:{A:{sleep:'22:00',wake:'07:00'},B:{sleep:'22:00',wake:'07:00'}},points:{A:0,B:0},recs:{},shop:[{id:1,e:'🧋',n:'请喝奶茶',d:'对方请你喝一杯奶茶',c:7},{id:2,e:'🎬',n:'选电影之夜',d:'今晚你来选电影',c:5},{id:3,e:'🏠',n:'免做家务',d:'免做一次家务活',c:10},{id:4,e:'💆',n:'按摩15分钟',d:'对方给你按摩放松',c:8},{id:5,e:'🍰',n:'请吃甜品',d:'对方请你吃一份甜品',c:5},{id:6,e:'💤',n:'赖床券',d:'周末多睡1小时不被叫醒',c:6},{id:7,e:'📱',n:'免打扰1小时',d:'1小时不被打扰的自由',c:3},{id:8,e:'🍽️',n:'指定晚餐',d:'你来指定今晚吃什么',c:8}],redeems:[],nextShopId:9,eggs:{shards:{A:0,B:0},freePass:{A:0,B:0},backpack:[],weeklyEgg:null,lastDailyEgg:{A:null,B:null},lastWeeklyEgg:null,albumMarked:{A:false,B:false},voiceMarked:{A:false,B:false},unlockMonth:null,wallpaperCount:0,repairCards:{A:1,B:1},_sleepDateFixed:false,_sstExtraCard:false,_sstExtraCard2:false}};ensureEggs();await save();toast('数据已清除','ok');render()}

/* ═══ INIT ═══ */
document.querySelectorAll('.tab').forEach(function(b){b.addEventListener('click',function(){sTab(b.dataset.pg)})});
document.querySelectorAll('.mbg').forEach(function(m){m.addEventListener('click',function(e){if(e.target===e.currentTarget)closeMo(m.id)})});
greet();setInterval(greet,60000);load();setInterval(load,8000);
document.addEventListener('visibilitychange',function(){if(!document.hidden)load()});
